functions:
  - GoodUnimodalFunction
  - PlateauAsymmetricUnimodalFunction
  - SecondSpecialUnimodalFunction
  - MultimodalRastrigin
optimizers:
  - PassiveSearch
  - BrentWrapper
  - Dichotomy
  - GoldenSection
  - Fibonacci
  - Parabola
base_config:
  max_iter: 5000
  max_evaluations: 1000000
  delta: 1.0e-8
