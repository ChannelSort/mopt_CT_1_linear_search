functions:
  - name: WellConditionedQuadratic
    params: {x0: [-2.0, -2.0]}
  - name: IllConditionedQuadratic
    params: {x0: [-2.0, -2.0]}
  - name: Rosenbrock
    params: {x0: [-1.2, 1.0]}
  - name: Ackley
    params: {x0: [1.0, 1.0]}
  - name: Himmelblau
    params: {x0: [2.0, 2.0]}
  - name: Rosenbrock
    params: {x0: [-2.0, 2.0]}
  - name: Himmelblau
    params: {x0: [-2.0, 3.0]}
optimizers:
  - name: Momentum
    param_grid:
      values:
        alpha: [1.0e-4, 3.0e-4, 1.0e-3, 3.0e-3, 1.0e-2]
        beta: [0.5, 0.7, 0.85, 0.9, 0.95]
  - name: Nesterov
    param_grid:
      values:
        alpha: [1.0e-4, 3.0e-4, 1.0e-3, 3.0e-3, 1.0e-2]
        beta: [0.5, 0.7, 0.85, 0.9, 0.95]
  - name: AdaGrad
    param_grid:
      values:
        alpha: [1.0e-3, 3.0e-3, 1.0e-2, 3.0e-2, 1.0e-1]
  - name: RMSProp
    param_grid:
      values:
        alpha: [1.0e-4, 3.0e-4, 1.0e-3, 3.0e-3, 1.0e-2]
        rho: [0.5, 0.7, 0.85, 0.9, 0.95]
  - name: AdaDelta
    param_grid:
      values:
        rho: [0.5, 0.7, 0.85, 0.9, 0.95]
  - name: Adam
    param_grid:
      values:
        alpha: [1.0e-4, 3.0e-4, 1.0e-3, 3.0e-3, 1.0e-2]
        beta1: [0.7, 0.8, 0.85, 0.9, 0.95]
        beta2: [0.9, 0.95, 0.99, 0.995, 0.999]
base_config:
  max_iter: 1500
  tol_step: 1.0e-12
  epsilon: 1.0e-8
stopping_tolerances: [1.0e-8]
parallel: false
output_dir: outputs/lab3
plots:
  heatmaps: true
  trajectories: true
  trajectory_tolerance: 1.0e-8
